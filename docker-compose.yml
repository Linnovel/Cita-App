version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: tu_usuario
      POSTGRES_PASSWORD: tu_password
      POSTGRES_DB: citaapp_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: citaapp-backend
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - db
    ports:
      - "3000:3000"

  frontend-admin:
    build: ./frontend/admin
    container_name: citaapp-admin
    ports:
      - "8081:80" # Acceso en http://localhost:8081

  frontend-customer:
    build: ./frontend/customer
    container_name: citaapp-customer
    ports:
      - "8082:80" # Acceso en http://localhost:8082

volumes:
  pgdata: